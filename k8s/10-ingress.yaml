apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: movie-watchlist-ingress
  namespace: movie-watchlist
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: traefik
  rules:
    - host: movie.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: movie-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: movie-backend
                port:
                  number: 5001